<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matcha BackOffice Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <header>
      <!-- NAVBAR START -->
      <nav class="navbar navbar-expand-md matcha-nav">
        <div class="container-fluid">
          <a class="navbar-brand" href="./index.html">
            <img
              class="matcha-logo"
              src="https://cdn-icons-png.flaticon.com/512/6143/6143066.png"
              alt="matcha logo"
            />
          </a>

          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link" href="./index.html">Home</a>
              </li>

              <li class="nav-item">
                <a class="nav-link active" href="#">BackOffice</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <!--  NAVBAR END -->
    </header>
    <h1 class="m-4 text-center">BackOffice</h1>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-10 col-md-6">
          <div class="matcha-card p-4">
            <h3 class="text-center">Card input fields:</h3>
            <form id="product-form">
              <input id="name" class="form-control mb-3" placeholder="Name" />

              <input
                id="description"
                class="form-control mb-3"
                placeholder="Description"
              />

              <input id="brand" class="form-control mb-3" placeholder="Brand" />

              <input
                id="imageUrl"
                class="form-control mb-3"
                placeholder="Image URL"
              />

              <input
                id="price"
                type="number"
                class="form-control mb-4"
                placeholder="Price"
              />

              <button class="btn matcha-button w-100">Save Product</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/matcha-bk.js"></script>
  </body>
</html>
