<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matcha Page</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <header>
      <!-- NAVBAR START -->
      <nav class="navbar navbar-expand-lg matcha-nav">
        <div class="container-fluid">
          <a class="navbar-brand" href="./index.html"
            ><img
              class="matcha-logo"
              src="https://cdn-icons-png.flaticon.com/512/6143/6143066.png"
              alt="matcha logo"
          /></a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
              <li class="nav-item">
                <a class="nav-link active" aria-current="page" href="./index.html">Home</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./matcha-dets.html">Features</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="./matcha-bk.html">BackEnd</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
      <!--  NAVBAR END -->
    </header>
    <h1>BackOffice Page</h1>
    <form id="product-form" class="d-flex flex-column align-items-center mt-5">
        <h2>New Product:</h2>
      <input id="name" class="form-control mb-2" placeholder="Name" required />

      <input
        id="description"
        class="form-control mb-2"
        placeholder="Description"
        required
      />

      <input id="brand" class="form-control mb-2" placeholder="Brand" required/>

      <input id="imageUrl" class="form-control mb-2" placeholder="Image URL" required />

      <input
        id="price"
        type="number"
        class="form-control mb-2"
        placeholder="Price"
        required
      />

      <button class="btn matcha-button">Save Product</button>
    </form>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/matcha-bk.js"></script>
  </body>
</html>
